# Archivo: docker-compose.yml
# Compose principal que une los servicios necesarios para ejecutar CineRoadMap.

services:
  mysql:
    image: mysql:8.4
    container_name: cineroadmap-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cineroadmap
      MYSQL_USER: cineroadmap
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Define MYSQL_PASSWORD en .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Define MYSQL_ROOT_PASSWORD en .env}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - cineroadmap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?Define MYSQL_ROOT_PASSWORD en .env}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: CRM.AplicacionWeb/Dockerfile
    container_name: cineroadmap-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=cineroadmap-mysql;Port=3306;Database=cineroadmap;User ID=cineroadmap;Password=${MYSQL_PASSWORD:?Define MYSQL_PASSWORD en .env};SslMode=None;AllowPublicKeyRetrieval=true;
    ports:
      - "8080:8080"
    networks:
      - cineroadmap-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cineroadmap-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: cineroadmap-mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Define MYSQL_ROOT_PASSWORD en .env}
    ports:
      - "8081:80"
    networks:
      - cineroadmap-network

volumes:
  mysql-data:

networks:
  cineroadmap-network:
    name: cineroadmap-network
